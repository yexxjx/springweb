# application.properties 파일은 항상 resource 폴더 바로 아래 만든다
# 목적 : 스프링
# 주석할 때는 # 사용
# 프로퍼티 파일에 대한 디폴트 인코딩 : UTF-8 변경

# 1. 내장 AWS PoRT(프로그램 식별번호) 번호 변경, 기본값은 8080이며 수저 ㅇ가능,
server.port=8080

# 2. DAO가 아닌 프로터피 파일에서 DB연동 가능하다. JDBC
# 2-1
#spring.datasource.url=jdbc:mysql://localhost:3306/mydb0303
#spring.datasource.url=jdbc:mysql://localhost:3306/mydb0304
#spring.datasource.url=jdbc:mysql://localhost:3306/mydb0305
#spring.datasource.url=jdbc:mysql://localhost:3306/boardservice10
#spring.datasource.url=jdbc:mysql://localhost:3306/mydb0309
#spring.datasource.url=jdbc:mysql://localhost:3306/practice7
spring.datasource.url=jdbc:mysql://localhost:3306/mydb0311
# 2-2 연동할 db 서버의 계정/비밀번호, 띄어쓰기 주의
spring.datasource.username=root
spring.datasource.password=1234

# 2-3 Entity 테이블 생성/수정, DDL: sql정의어
# create: 서버 실행할 때마다 삭제 후 생성
# update: 서버 실행할 때마다 존재하면 수정, 존재하지 않으면 생성
# none: 사용안함
spring.jpa.hibernate.ddl-auto=create

# 2-4 콘솔창에 실행된 sql 표시 *개발 단계* 디버깅(확인용) *운영/배포 단계 사용하지 않는다*
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# SQL 내 매개변수 값들을 표시 *운영/배포시 모니터링(유지보수) 사용되는 경우*
logging.level.org.hibernate.jdbc.bind=TRACE
logging.level.org.hibernate.sql=DEBUG

# 2-5 서버 실행할 때 SQL 파일 실행 *개발 단계*, always/none *운영/배포 단계 사용하지 않는다*
spring.sql.init.mode=always

#2-6 서버 실행할 때 classpath(resources) 이하에 data.sql 파일 경로 지정
spring.sql.init.data-locations=classpath:/sql/data.sql

# 2-7 서버 실행할 때 JPA가 초기화 파일 실행
spring.jpa.defer-datasource-initialization=true


